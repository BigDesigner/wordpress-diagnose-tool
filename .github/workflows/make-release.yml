name: Make Professional Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, phpunit

      - name: Run Unit Tests
        run: phpunit --configuration phpunit.xml.dist

      - name: Run Production Build
        run: php build.php

      - name: Compress Distribution Assets
        run: |
          cd diagnose
          zip -r ../wp-diagnose-dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            wp-diagnose-dist.zip
            diagnose/wp-diagnose-pro.php
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
