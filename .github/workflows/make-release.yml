name: Make Professional Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, phpunit

      - name: Run Unit Tests
        run: phpunit --configuration phpunit.xml.dist

      - name: Run Production Build
        run: php build.php

      - name: Compress Distribution Assets
        run: |
          cd diagnose
          zip -r ../wp-diagnose-dist.zip .

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Git Tag if not exists
        run: |
          git fetch --tags
          if ! git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag v${{ env.VERSION }} does not exist. Creating it."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v${{ env.VERSION }}"
            git push origin "v${{ env.VERSION }}"
          else
            echo "Tag v${{ env.VERSION }} already exists."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            wp-diagnose-dist.zip
            diagnose/wp-diagnose-pro.php
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
